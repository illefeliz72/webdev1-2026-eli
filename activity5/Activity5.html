<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=i">
    <title>Activity5</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="quote-card">
            <blockquote>"The best way to learn CSS is to break things and rebuild them."</blockquote>
            <cite>- A WISE DEVELOPER</cite>
        </div>

        <div class="stats">

            <div class="stat">
                <span class="num">128</span>
                <span class="label">Projects</span>
            </div>


            <div class="stat">
                <span class="num">4.9</span>
                <span class="label">Rating</span>
            </div>


            <div class="stat">
                <span class="num">99%</span>
                <span class="label">Uptime</span>
            </div>
        </div>
        <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email">
            <span class="helper">we'll never share your email.</span>
        </div>
        <div class="banner">
            <h2>Make it Beautiful</h2>
            <p>CSS gradients can be applied to text, not just backgrounds.</p>
        </div>
        <div class="price-card">
            <p class="label">"Premium Plan"</p>
            <p class="old-price">₱2,400</p>
            <p class="new-price">₱1,200/yr</p>
            <span class="save-badge">Save 50%</span>
        </div>
    </main>
</body>

</html>
